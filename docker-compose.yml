services:
  postgres:
    image: pgvector/pgvector:pg17
    profiles: ["bundled-db"]
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-codexfleet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codexfleet}
      POSTGRES_DB: ${POSTGRES_DB:-codexfleet}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-codexfleet} -d ${POSTGRES_DB:-codexfleet}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build: .
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    restart: unless-stopped

volumes:
  postgres_data:
